services:
  app-dev:
    build:
      context: .
    container_name: excel-online-market-dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "80:5173"
    env_file:
      - .env
    volumes:
      - ./exports:/app/exports
    restart: unless-stopped

  app-preview:
    build:
      context: .
    container_name: excel-online-market-preview
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    ports:
      - "80:4173"
    env_file:
      - .env
    profiles:
      - preview
    restart: unless-stopped
