# Запуск: docker compose -f docker-compose.sonar.yml up -d
# UI: http://localhost:9000 (логин по умолчанию admin / admin — смените пароль)
services:
  sonarqube:
    image: sonarqube:community
    container_name: excel-om-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
